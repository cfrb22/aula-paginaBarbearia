<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 440" width="200" height="440">
  <defs>
    <!-- Gradiente do corpo principal -->
    <linearGradient id="g-corpo" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0C0C0C"/>
      <stop offset="18%"  stop-color="#272727"/>
      <stop offset="48%"  stop-color="#3C3C3C"/>
      <stop offset="78%"  stop-color="#202020"/>
      <stop offset="100%" stop-color="#0C0C0C"/>
    </linearGradient>

    <!-- Gradiente âmbar para anéis e alavanca -->
    <linearGradient id="g-ambar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4A2F05"/>
      <stop offset="28%"  stop-color="#B8922A"/>
      <stop offset="50%"  stop-color="#E8C86A"/>
      <stop offset="72%"  stop-color="#B8922A"/>
      <stop offset="100%" stop-color="#4A2F05"/>
    </linearGradient>

    <!-- Gradiente cromado para a barra da lâmina -->
    <linearGradient id="g-cromo" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#303030"/>
      <stop offset="22%"  stop-color="#A8A8A8"/>
      <stop offset="48%"  stop-color="#E4E4E4"/>
      <stop offset="75%"  stop-color="#A0A0A0"/>
      <stop offset="100%" stop-color="#303030"/>
    </linearGradient>

    <!-- Sombra projetada no objeto -->
    <filter id="f-sombra" x="-25%" y="-8%" width="150%" height="120%">
      <feDropShadow dx="7" dy="14" stdDeviation="14" flood-color="#000000" flood-opacity="0.60"/>
    </filter>

    <!-- Brilho suave âmbar próximo à lâmina -->
    <radialGradient id="g-brilho-lamina" cx="50%" cy="100%" r="50%">
      <stop offset="0%"   stop-color="#C9A84C" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g filter="url(#f-sombra)">

    <!-- ════════════════════════════════════
         DENTES DA LÂMINA (topo do aparelho)
         Dois conjuntos entrelaçados simulam
         a lâmina estacionária e a móvel.
    ════════════════════════════════════ -->

    <!-- Dentes estacionários (mais escuros, mais longos) -->
    <g fill="#5A5A5A">
      <rect x="27"  y="1"  width="5" height="29" rx="2.5"/>
      <rect x="35"  y="0"  width="5" height="31" rx="2.5"/>
      <rect x="43"  y="1"  width="5" height="29" rx="2.5"/>
      <rect x="51"  y="0"  width="5" height="31" rx="2.5"/>
      <rect x="59"  y="1"  width="5" height="29" rx="2.5"/>
      <rect x="67"  y="0"  width="5" height="31" rx="2.5"/>
      <rect x="75"  y="1"  width="5" height="29" rx="2.5"/>
      <rect x="83"  y="0"  width="5" height="31" rx="2.5"/>
      <rect x="91"  y="1"  width="5" height="29" rx="2.5"/>
      <rect x="99"  y="0"  width="5" height="31" rx="2.5"/>
      <rect x="107" y="1"  width="5" height="29" rx="2.5"/>
      <rect x="115" y="0"  width="5" height="31" rx="2.5"/>
      <rect x="123" y="1"  width="5" height="29" rx="2.5"/>
      <rect x="131" y="0"  width="5" height="31" rx="2.5"/>
      <rect x="139" y="1"  width="5" height="29" rx="2.5"/>
      <rect x="147" y="0"  width="5" height="31" rx="2.5"/>
      <rect x="155" y="1"  width="5" height="29" rx="2.5"/>
      <rect x="163" y="0"  width="5" height="31" rx="2.5"/>
    </g>

    <!-- Dentes móveis (cromados, um pouco mais curtos e brilhantes) -->
    <g fill="#D0D0D0">
      <rect x="31"  y="5"  width="4" height="23" rx="2"/>
      <rect x="39"  y="4"  width="4" height="25" rx="2"/>
      <rect x="47"  y="5"  width="4" height="23" rx="2"/>
      <rect x="55"  y="4"  width="4" height="25" rx="2"/>
      <rect x="63"  y="5"  width="4" height="23" rx="2"/>
      <rect x="71"  y="4"  width="4" height="25" rx="2"/>
      <rect x="79"  y="5"  width="4" height="23" rx="2"/>
      <rect x="87"  y="4"  width="4" height="25" rx="2"/>
      <rect x="95"  y="5"  width="4" height="23" rx="2"/>
      <rect x="103" y="4"  width="4" height="25" rx="2"/>
      <rect x="111" y="5"  width="4" height="23" rx="2"/>
      <rect x="119" y="4"  width="4" height="25" rx="2"/>
      <rect x="127" y="5"  width="4" height="23" rx="2"/>
      <rect x="135" y="4"  width="4" height="25" rx="2"/>
      <rect x="143" y="5"  width="4" height="23" rx="2"/>
      <rect x="151" y="4"  width="4" height="25" rx="2"/>
      <rect x="159" y="5"  width="4" height="23" rx="2"/>
      <rect x="167" y="4"  width="4" height="25" rx="2"/>
    </g>

    <!-- ════════════════════════════════════
         BARRA CROMADA (suporte das lâminas)
    ════════════════════════════════════ -->
    <rect x="19" y="28" width="162" height="32" rx="5" fill="url(#g-cromo)"/>
    <!-- Reflexo superior na barra -->
    <rect x="21" y="30" width="158" height="9" rx="3" fill="rgba(255,255,255,0.28)"/>
    <!-- Sombra inferior da barra -->
    <rect x="19" y="56" width="162" height="4" fill="#0F0F0F"/>

    <!-- Parafuso esquerdo da lâmina -->
    <circle cx="42"  cy="44" r="5.5" fill="#424242"/>
    <circle cx="42"  cy="44" r="3.5" fill="#505050"/>
    <line x1="39.5" y1="44" x2="44.5" y2="44" stroke="#2A2A2A" stroke-width="1.2"/>
    <line x1="42"   y1="41.5" x2="42"   y2="46.5" stroke="#2A2A2A" stroke-width="1.2"/>

    <!-- Parafuso direito da lâmina -->
    <circle cx="158" cy="44" r="5.5" fill="#424242"/>
    <circle cx="158" cy="44" r="3.5" fill="#505050"/>
    <line x1="155.5" y1="44" x2="160.5" y2="44" stroke="#2A2A2A" stroke-width="1.2"/>
    <line x1="158"   y1="41.5" x2="158"   y2="46.5" stroke="#2A2A2A" stroke-width="1.2"/>

    <!-- ════════════════════════════════════
         CORPO PRINCIPAL
    ════════════════════════════════════ -->
    <rect x="24" y="55" width="152" height="315" rx="22" fill="url(#g-corpo)"/>

    <!-- Brilho na borda esquerda (efeito 3D) -->
    <rect x="24" y="78" width="4" height="268" rx="2" fill="rgba(255,255,255,0.055)"/>
    <!-- Sombra na borda direita -->
    <rect x="172" y="78" width="4" height="268" rx="2" fill="rgba(0,0,0,0.35)"/>

    <!-- ════════════════════════════════════
         ANEL ÂMBAR SUPERIOR
    ════════════════════════════════════ -->
    <rect x="24" y="67" width="152" height="13" rx="2" fill="url(#g-ambar)"/>
    <!-- Divisor fino abaixo do anel -->
    <rect x="24" y="78" width="152" height="2" fill="#080808"/>

    <!-- ════════════════════════════════════
         PAINEL SUPERIOR LISO
    ════════════════════════════════════ -->
    <rect x="24" y="80" width="152" height="60" fill="#1A1A1A"/>

    <!-- Placa da marca (verde musgo) -->
    <rect x="40" y="89" width="120" height="44" rx="5" fill="#1C2B1D"/>
    <!-- Filete decorativo superior da placa -->
    <rect x="42" y="91" width="116" height="2" rx="1" fill="rgba(201,168,76,0.28)"/>
    <!-- Nome da marca -->
    <text x="100" y="108"
      font-family="Georgia,'Times New Roman',serif"
      font-size="10.5" font-weight="bold"
      fill="#C9A84C" text-anchor="middle" letter-spacing="3.5">CLASSIC</text>
    <!-- Linha divisória na placa -->
    <line x1="50" y1="113" x2="150" y2="113" stroke="#C9A84C" stroke-width="0.5" opacity="0.35"/>
    <!-- Subtítulo da marca -->
    <text x="100" y="126"
      font-family="Georgia,serif"
      font-size="7.5"
      fill="#8F9A8F" text-anchor="middle" letter-spacing="2.5">BARBER CO.</text>

    <!-- ════════════════════════════════════
         ANEL ÂMBAR MÉDIO
    ════════════════════════════════════ -->
    <rect x="24" y="142" width="152" height="12" rx="1.5" fill="url(#g-ambar)"/>
    <rect x="24" y="152" width="152" height="2" fill="#080808"/>

    <!-- ════════════════════════════════════
         ÁREA DE GRIP (textura canelada)
    ════════════════════════════════════ -->
    <rect x="24" y="154" width="152" height="144" fill="#101010"/>

    <!-- Canaletas de grip — 15 linhas levemente mais claras -->
    <g fill="#252525">
      <rect x="24" y="159" width="152" height="5"/>
      <rect x="24" y="168" width="152" height="5"/>
      <rect x="24" y="177" width="152" height="5"/>
      <rect x="24" y="186" width="152" height="5"/>
      <rect x="24" y="195" width="152" height="5"/>
      <rect x="24" y="204" width="152" height="5"/>
      <rect x="24" y="213" width="152" height="5"/>
      <rect x="24" y="222" width="152" height="5"/>
      <rect x="24" y="231" width="152" height="5"/>
      <rect x="24" y="240" width="152" height="5"/>
      <rect x="24" y="249" width="152" height="5"/>
      <rect x="24" y="258" width="152" height="5"/>
      <rect x="24" y="267" width="152" height="5"/>
      <rect x="24" y="276" width="152" height="5"/>
      <rect x="24" y="285" width="152" height="5"/>
    </g>

    <!-- ════════════════════════════════════
         ANEL ÂMBAR INFERIOR
    ════════════════════════════════════ -->
    <rect x="24" y="300" width="152" height="12" rx="1.5" fill="url(#g-ambar)"/>
    <rect x="24" y="310" width="152" height="2" fill="#080808"/>

    <!-- ════════════════════════════════════
         PAINEL INFERIOR LISO
    ════════════════════════════════════ -->
    <rect x="24" y="312" width="152" height="56" fill="#181818"/>

    <!-- Tampa inferior arredondada -->
    <rect x="24" y="344" width="152" height="26" rx="20" fill="#141414"/>

    <!-- Saída do cabo (reforço de borracha) -->
    <rect x="76" y="360" width="48" height="10" rx="5" fill="#0C0C0C"/>
    <rect x="82" y="362" width="36" height="6" rx="3" fill="#181818"/>

    <!-- ════════════════════════════════════
         ALAVANCA DE TAPER (lateral direita)
    ════════════════════════════════════ -->
    <rect x="173" y="126" width="18" height="80" rx="7" fill="url(#g-ambar)"/>
    <!-- Brilho no topo da alavanca -->
    <rect x="175" y="128" width="14" height="11" rx="5" fill="rgba(255,255,255,0.22)"/>
    <!-- Encaixe para o polegar (linhas de grip) -->
    <g fill="rgba(0,0,0,0.30)">
      <rect x="175" y="146" width="14" height="2" rx="1"/>
      <rect x="175" y="152" width="14" height="2" rx="1"/>
      <rect x="175" y="158" width="14" height="2" rx="1"/>
      <rect x="175" y="164" width="14" height="2" rx="1"/>
      <rect x="175" y="170" width="14" height="2" rx="1"/>
      <rect x="175" y="176" width="14" height="2" rx="1"/>
      <rect x="175" y="182" width="14" height="2" rx="1"/>
      <rect x="175" y="188" width="14" height="2" rx="1"/>
    </g>
    <!-- Tampa inferior da alavanca -->
    <ellipse cx="182" cy="206" rx="9" ry="5" fill="#7A5910"/>

  </g><!-- fim do grupo com sombra -->

  <!-- ════════════════════════════════════
       CABO DE ENERGIA
       Dois fios saem da base e se unem
       formando o cabo clássico vintage.
  ════════════════════════════════════ -->
  <!-- Sombra do cabo -->
  <path d="M84 370 Q80 400 100 418 Q120 400 116 370"
    fill="none" stroke="#050505" stroke-width="13" stroke-linecap="round"/>
  <!-- Corpo do cabo -->
  <path d="M84 370 Q80 400 100 418 Q120 400 116 370"
    fill="none" stroke="#1A1A1A" stroke-width="9" stroke-linecap="round"/>
  <!-- Reflexo central do cabo -->
  <path d="M88 372 Q85 398 100 414 Q115 398 112 372"
    fill="none" stroke="#282828" stroke-width="4" stroke-linecap="round"/>

  <!-- Plug do cabo -->
  <line x1="100" y1="418" x2="100" y2="436"
    stroke="#0D0D0D" stroke-width="12" stroke-linecap="round"/>
  <line x1="100" y1="418" x2="100" y2="436"
    stroke="#1E1E1E" stroke-width="7" stroke-linecap="round"/>
  <!-- Pinos do plug -->
  <rect x="90" y="434" width="6" height="5" rx="1.5" fill="#0A0A0A"/>
  <rect x="104" y="434" width="6" height="5" rx="1.5" fill="#0A0A0A"/>

  <!-- Brilho âmbar sutil próximo à lâmina (iluminação ambiente) -->
  <rect x="19" y="28" width="162" height="35" rx="5"
    fill="url(#g-brilho-lamina)" opacity="0.7"/>

</svg>
